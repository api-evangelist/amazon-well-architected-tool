aid: amazon-well-architected-tool
name: Amazon Well-Architected Tool
description: 'The AWS Well-Architected Tool helps you review your workloads and compare them to the latest AWS architectural
  best practices. It provides a consistent process for evaluating architectures and implementing designs that scale over time
  across five pillars: operational excellence, security, reliability, performance efficiency, and cost optimization. The tool
  offers lens catalogs, custom lenses, profiles, review templates, and API-driven extensibility for integration into governance
  workflows.'

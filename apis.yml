    name: AWS Well-Architected Tool API
    description: >-
      The AWS Well-Architected Tool API provides programmatic access to create
      and manage workloads, lenses, milestones, and review reports. It enables
      integration of the Well-Architected review process into DevOps workflows
      and automation pipelines for continuous architecture assessment.

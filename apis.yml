  name: AWS Well-Architected Tool API
  description: The AWS Well-Architected Tool API provides programmatic access to create and manage workloads, lenses, milestones,
    profiles, review templates, and review reports. It enables integration of the Well-Architected review process into DevOps
    workflows and automation pipelines for continuous architecture assessment. The API supports 56 operations covering workload
    management, lens operations, lens reviews, answers, milestones, profiles, review templates, notifications, checks, and
    administration.

  - type: Features
    data:
    - name: Lens Catalog
      description: Expert-authored review lenses from AWS covering diverse technology and industry-specific pillars, continuously
        refreshed with latest best practices.
    - name: Custom Lenses
      description: Create organization-specific lenses that combine internal best practices with AWS guidance, shareable with
        up to 300 IAM users or across AWS Organizations.
    - name: Profiles
      description: Pre-define business goals to auto-generate prioritized review questions tailored to your workload context.
    - name: Review Templates
      description: Standardize answers across multiple workloads to ensure consistent architectural reviews at scale.
    - name: Enhanced Collaboration
      description: Share workloads and custom lenses with IAM users or integrate with AWS Organizations for organization-wide
        access and visibility.
    - name: Service Integration
      description: Native integration with AWS Trusted Advisor and AWS Service Catalog AppRegistry to reduce manual review effort.
    - name: API-Driven Extensibility
      description: Robust APIs allow extending Well-Architected functionality into existing architecture governance processes,
        applications, and workflows.
    - name: Milestone Tracking
      description: Save milestones, implement improvements, and measure progress over time with point-in-time snapshots of workload
        review state.
    - name: Compliance and Regulatory Support
      description: Available in GovCloud (US) with FedRAMP compliance for organizations with stringent regulatory requirements.
    - name: Consolidated Reporting
      description: Generate consolidated reports across workloads for governance and executive visibility into architectural
        risk posture.
  - type: UseCases
    data:
    - name: Architecture Reviews and Governance
      description: Evaluate cloud workload architecture quality against AWS best practices across the five Well-Architected
        pillars.
    - name: Multi-Workload Standardization
      description: Use review templates to standardize architectural answers and enforce consistent governance across multiple
        workloads and teams.
    - name: Industry-Specific Best Practice Implementation
      description: Apply industry-specific and technology-specific lenses from the lens catalog to assess specialized workloads.
    - name: Regulatory Compliance Assessment
      description: Evaluate workloads for FedRAMP, GovCloud, and other regulatory compliance requirements through targeted lenses.
    - name: DevOps Pipeline Integration
      description: Integrate Well-Architected reviews into CI/CD workflows and automation pipelines for continuous architecture
        assessment.
    - name: Cross-Team Architectural Alignment
      description: Share workloads with reviewers and stakeholders to facilitate collaborative architectural decision-making
        across teams.
    - name: Sustainability Goal Realization
      description: Use the sustainability pillar to minimize environmental impact and meet organizational sustainability commitments.
  - type: Integrations
    data:
    - name: AWS Trusted Advisor
      description: Integration with AWS Trusted Advisor provides automated checks that complement manual Well-Architected review
        processes.
    - name: AWS Service Catalog AppRegistry
      description: AppRegistry integration enables linking Well-Architected workloads to application metadata for richer governance
        context.
    - name: AWS Organizations
      description: Organization-level sharing of workloads and custom lenses for enterprise-wide architectural governance programs.
    - name: AWS IAM
      description: Fine-grained access control via AWS IAM for workload sharing and reviewer management within the tool.
    - name: AWS CloudFormation
      description: Workloads can be associated with CloudFormation stacks for automated resource discovery and architecture
        documentation.

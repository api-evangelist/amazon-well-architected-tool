        $ref: '#/components/schemas/ChoiceId'
    ShareId:
      type: string
      pattern: '[0-9a-f]{32}'
      description: The ID associated with the share.
    MilestoneName:
      type: string
      description: <p>The name of the milestone in a workload.</p> <p>Milestone names must be unique within a workload.</p>

tags:
- name: ProfileTemplate
paths:
  /profileTemplate:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    get:
      operationId: GetProfileTemplate
      description: Get profile template.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfileTemplateOutput'
        '480':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '481':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '482':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
        '483':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '484':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
      parameters: []
      summary: Amazon Well-Architected Tool Get Profile Template
      tags:
      - ProfileTemplate
components:
  parameters:
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
  schemas:
    ChoiceId:
      type: string
      description: The ID of a choice.
      minLength: 1
      maxLength: 64
    QuestionId:
      type: string
      description: The ID of the question.
      minLength: 1
      maxLength: 128
    ChoiceTitle:
      type: string
      description: The title of a choice.
      minLength: 1
      maxLength: 512
    QuestionTitle:
      type: string
      description: The title of the question.
      minLength: 1
      maxLength: 512
    Timestamp:
      type: string
      description: The date and time recorded.
      format: date-time
    GetProfileTemplateOutput:
      type: object
      properties:
        ProfileTemplate:
          allOf:
          - $ref: '#/components/schemas/ProfileTemplate'
          - description: The profile template.
    ProfileTemplateQuestion:
      type: object
      properties:
        QuestionId:
          $ref: '#/components/schemas/QuestionId'
        QuestionTitle:
          $ref: '#/components/schemas/QuestionTitle'
        QuestionDescription:
          $ref: '#/components/schemas/QuestionDescription'
        QuestionChoices:
          allOf:
          - $ref: '#/components/schemas/ProfileTemplateQuestionChoices'
          - description: The question choices.
        MinSelectedChoices:
          allOf:
          - $ref: '#/components/schemas/MinSelectedProfileChoices'
          - description: The minimum number of choices selected.
        MaxSelectedChoices:
          allOf:
          - $ref: '#/components/schemas/MaxSelectedProfileChoices'
          - description: The maximum number of choices selected.
      description: A profile template question.
    ProfileTemplateChoice:
      type: object
      properties:
        ChoiceId:
          $ref: '#/components/schemas/ChoiceId'
        ChoiceTitle:
          $ref: '#/components/schemas/ChoiceTitle'
        ChoiceDescription:
          $ref: '#/components/schemas/ChoiceDescription'
      description: A profile template choice.
    AccessDeniedException: {}
    MaxSelectedProfileChoices:
      type: integer
      minimum: 0
    TemplateQuestions:
      type: array
      items:
        $ref: '#/components/schemas/ProfileTemplateQuestion'
    InternalServerException: {}
    ProfileName:
      type: string
      pattern: ^[A-Za-z0-9-_.,:/()@!&?#+'’\s]+$
      minLength: 3
      maxLength: 100
    QuestionDescription:
      type: string
      description: The description of the question.
      minLength: 1
      maxLength: 1024
    ProfileTemplate:
      type: object
      properties:
        TemplateName:
          allOf:
          - $ref: '#/components/schemas/ProfileName'
          - description: The name of the profile template.
        TemplateQuestions:
          allOf:
          - $ref: '#/components/schemas/TemplateQuestions'
          - description: Profile template questions.
        CreatedAt:
          $ref: '#/components/schemas/Timestamp'
        UpdatedAt:
          $ref: '#/components/schemas/Timestamp'
      description: The profile template.
    ChoiceDescription:
      type: string
      description: The description of a choice.
      minLength: 1
      maxLength: 1024
    MinSelectedProfileChoices:
      type: integer
      minimum: 0
    ProfileTemplateQuestionChoices:
      type: array
      items:
        $ref: '#/components/schemas/ProfileTemplateChoice'
    ThrottlingException: {}
    ResourceNotFoundException: {}
    ValidationException: {}
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
externalDocs:
  description: Amazon Web Services documentation
  url: https://docs.aws.amazon.com/wellarchitected/
x-hasEquivalentPaths: true

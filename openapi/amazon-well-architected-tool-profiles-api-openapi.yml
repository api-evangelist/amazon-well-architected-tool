          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '481':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
        '482':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '483':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '484':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
      parameters:
      - name: ProfileArn
        in: path
        required: true
        description: The profile ARN.
        schema:
          type: string
          pattern: arn:aws[-a-z]*:wellarchitected:[a-z]{2}(-gov)?-[a-z]+-\d:\d{12}:profile/[a-z0-9]+
          maxLength: 2084
      - name: SharedWithPrefix
        in: query
        required: false
        description: The Amazon Web Services account ID, IAM role, organization ID, or organizational unit (OU) ID with which the profile is shared.
        schema:
          type: string
          maxLength: 100
      - name: NextToken
        in: query
        required: false
        description: ''
        schema:
          type: string
          description: The token to use to retrieve the next set of results.
      - name: MaxResults
        in: query
        required: false
        description: The maximum number of results to return for this request.
        schema:
          type: integer
          minimum: 1
          maximum: 50
      - name: Status
        in: query
        required: false
        description: ''
        schema:
          type: string
          enum:
          - ACCEPTED
          - REJECTED
          - PENDING
          - REVOKED
          - EXPIRED
          - ASSOCIATING
          - ASSOCIATED
          - FAILED
          description: The status of the share request.
      summary: Amazon Well-Architected Tool List Profile Shares
      tags:
      - Profiles

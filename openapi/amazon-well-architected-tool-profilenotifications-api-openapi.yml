security:
- hmac: []
tags:
- name: ProfileNotifications
paths:
  /profileNotifications/:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    get:
      operationId: ListProfileNotifications
      description: List profile notifications.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProfileNotificationsOutput'
        '480':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '481':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
      parameters:
      - name: WorkloadId
        in: query
        required: false
        description: ''
        schema:
          type: string
          pattern: '[0-9a-f]{32}'
          description: The ID assigned to the workload. This ID is unique within an Amazon Web Services Region.
          minLength: 32
          maxLength: 32
      - name: NextToken
        in: query
        required: false
        description: ''
        schema:
          type: string
          description: The token to use to retrieve the next set of results.
      - name: MaxResults
        in: query
        required: false
        description: ''
        schema:
          type: integer
          description: The maximum number of results to return for this request.
          minimum: 1
          maximum: 50
      summary: Amazon Well-Architected Tool List Profile Notifications
      tags:
      - ProfileNotifications
components:
  schemas:
    WorkloadName:
      type: string
      description: <p>The name of the workload.</p> <p>The name must be unique within an account within an Amazon Web Services Region. Spaces and capitalization are ignored when checking for uniqueness.</p>
      minLength: 3
      maxLength: 100
    ProfileNotificationSummary:
      type: object
      properties:
        CurrentProfileVersion:
          allOf:
          - $ref: '#/components/schemas/ProfileVersion'
          - description: The current profile version.
        LatestProfileVersion:
          allOf:
          - $ref: '#/components/schemas/ProfileVersion'
          - description: The latest profile version.
        Type:
          allOf:
          - $ref: '#/components/schemas/ProfileNotificationType'
          - description: Type of notification.
        ProfileArn:
          allOf:
          - $ref: '#/components/schemas/ProfileArn'
          - description: The profile ARN.
        ProfileName:
          allOf:
          - $ref: '#/components/schemas/ProfileName'
          - description: The profile name.
        WorkloadId:
          $ref: '#/components/schemas/WorkloadId'
        WorkloadName:
          $ref: '#/components/schemas/WorkloadName'
      description: The profile notification summary.
    WorkloadId:
      type: string
      pattern: '[0-9a-f]{32}'
      description: The ID assigned to the workload. This ID is unique within an Amazon Web Services Region.
      minLength: 32
      maxLength: 32
    AccessDeniedException: {}
    ProfileNotificationSummaries:
      type: array
      items:
        $ref: '#/components/schemas/ProfileNotificationSummary'
    InternalServerException: {}
    ProfileName:
      type: string
      pattern: ^[A-Za-z0-9-_.,:/()@!&?#+'’\s]+$
      minLength: 3
      maxLength: 100
    ProfileNotificationType:
      type: string
      enum:
      - PROFILE_ANSWERS_UPDATED
      - PROFILE_DELETED
    ProfileArn:
      type: string
      pattern: arn:aws[-a-z]*:wellarchitected:[a-z]{2}(-gov)?-[a-z]+-\d:\d{12}:profile/[a-z0-9]+
      maxLength: 2084
    ListProfileNotificationsOutput:
      type: object
      properties:
        NotificationSummaries:
          allOf:
          - $ref: '#/components/schemas/ProfileNotificationSummaries'
          - description: Notification summaries.
        NextToken:
          $ref: '#/components/schemas/NextToken'
    ProfileVersion:
      type: string
      pattern: ^[A-Za-z0-9-]+$
      minLength: 1
      maxLength: 32
    ThrottlingException: {}
    NextToken:
      type: string
      description: The token to use to retrieve the next set of results.
    ValidationException: {}
  parameters:
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
